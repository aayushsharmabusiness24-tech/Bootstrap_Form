<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="css/bootstrap.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container ">
        <form class=" mt-3">
            <h3>Registration Form</h3>
            <div class="mb-3 mt-3">
                <label for="name" class="form-label">Name :</label>
                <input type="text" id="name" class="form-control" placeholder="Enter Name">
            </div>
            <div class="mb-3 ">
                <label for="email" class="form-label">Email :</label>
                <input type="email" id="email" class="form-control" placeholder="Enter Email">
            </div>
            <div class="mb-3 ">
                <label for="Pass" class="form-label">Password :</label>
                <input type="password" id="pass" class="form-control" placeholder="Enter Password">
                <small class="form-check-label text-danger"> * It must contain atleast 1 number , 1 english letter and 1
                    symbol up to 8 characters.</small>
            </div>


            <div class="mb-3">

                <label for="male" class="form-check-label">Gender</label><br>
                <input type="radio" id="male" class="form-check-label" name="gender"> Male
                <label for="female" class="form-check-label"></label>
                <input type="radio" id="female" class="form-check-label" name="gender"> Female
                <label for="other" class="form-check-label"></label>
                <input type="radio" id="other" class="form-check-label" name="gender"> Other

            </div>
            <div class="mb-3 form-check form-switch ">
                <input type="checkbox" role="switch"  class="form-check-input">
                <label for="notify" class="form-check-label">Notify Me </label>&nbsp;
                <label for="che" class="form-check-label"></label>
                <input type="checkbox" id="che" class="form-check-label" name="remember"> Remember me &nbsp;
             
            </div>
           
            <div>
                <label for="mes" class="form-label">Message</label>
                <textarea type="text" class="form-control" placeholder="Enter Your Suggestion"> </textarea>
            </div>
            <div class="mb-3">
                <button class="btn btn-primary mt-3 text-white mb-3"> Submit</button>
            </div>
        </form>
    </div>

</body>

</html>
